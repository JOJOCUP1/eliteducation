<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Elite Education Academy</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo-eea.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:#fffef8;color:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;-webkit-font-smoothing:antialiased}

    :root{
      --cream:#fffef8;--navy:#10476a;--gold:#e0a34a;--rust:#cb512e;
      --dark:#0d2f45;--text2:#4a5568;--text3:#9aa5b4;
      --border:rgba(16,71,106,0.12);--border2:rgba(16,71,106,0.25);
      --shadow:0 4px 24px rgba(16,71,106,0.10);--shadow2:0 12px 48px rgba(16,71,106,0.16);
      --green:#27ae60;--red:#e74c3c;
    }

    /* ── CARD ── */
    .auth-card{
      background:white;border:1px solid var(--border);border-radius:16px;
      padding:2.5rem 2rem;width:100%;max-width:440px;
      box-shadow:var(--shadow2);position:relative;overflow:hidden;
    }
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--rust))}

    /* ── LOGO ── */
    .logo-wrap{display:flex;align-items:center;gap:0.75rem;justify-content:center;margin-bottom:1.5rem}
    .logo-img{height:52px;border-radius:6px}
    .logo-text{display:flex;flex-direction:column;line-height:1.2}
    .logo-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy)}
    .logo-sub{font-size:0.58rem;color:var(--gold);letter-spacing:0.22em;text-transform:uppercase;font-weight:600}

    /* ── TITLE ── */
    .auth-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);font-weight:700;text-align:center;margin-bottom:0.3rem}
    .auth-sub{font-size:0.8rem;color:var(--text3);text-align:center;margin-bottom:1.8rem;letter-spacing:0.04em}

    /* ── TABS ── */
    .role-tabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:1.5rem;border:1.5px solid var(--navy);border-radius:8px;overflow:hidden}
    .role-tab{padding:0.65rem;background:transparent;border:none;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;color:var(--navy);cursor:pointer;letter-spacing:0.06em;transition:all 0.2s}
    .role-tab.active{background:var(--navy);color:white}

    /* ── FORM ── */
    .form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.85rem}
    .form-label{font-size:0.68rem;color:var(--navy);font-weight:600;letter-spacing:0.1em;text-transform:uppercase}
    .form-input{padding:0.78rem 1rem;background:#fafaf4;border:1.5px solid #e0ddd0;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.88rem;color:#1a1a2e;outline:none;transition:border-color 0.2s;width:100%}
    .form-input:focus{border-color:var(--navy)}

    /* ── BUTTONS ── */
    .btn-submit{width:100%;padding:0.9rem;background:var(--navy);color:white;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;transition:all 0.25s;margin-top:0.3rem}
    .btn-submit:hover{background:var(--dark)}
    .btn-submit:disabled{opacity:0.6;cursor:wait}

    .divider{display:flex;align-items:center;gap:0.75rem;margin:1rem 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:0.72rem;color:var(--text3);white-space:nowrap}

    .btn-google{width:100%;padding:0.82rem;background:white;border:1.5px solid var(--border2);border-radius:8px;font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.7rem;transition:all 0.2s;color:#1a1a2e}
    .btn-google:hover{border-color:var(--navy);background:#fafaf4}
    .g-icon{width:18px;height:18px;flex-shrink:0}

    /* ── SWITCH ── */
    .switch-mode{text-align:center;margin-top:1.2rem;font-size:0.8rem;color:var(--text2)}
    .switch-mode button{background:none;border:none;color:var(--navy);font-weight:600;cursor:pointer;font-size:0.8rem;text-decoration:underline}

    /* ── TOASTER ── */
    #toaster{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem}
    .toast{background:var(--navy);color:white;padding:0.75rem 1.2rem;border-radius:8px;font-size:0.8rem;font-weight:500;box-shadow:var(--shadow2);max-width:300px;animation:fadeUp 0.3s ease}
    .toast.success{background:var(--green)}
    .toast.warning{background:var(--rust)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div class="auth-card">

  <div class="logo-wrap">
    <img src="../assets/logo-eea.jpg" alt="EEA" class="logo-img" />
    <div class="logo-text">
      <span class="logo-name">Elite Education</span>
      <span class="logo-sub">Academy</span>
    </div>
  </div>

  <h1 class="auth-title" id="auth-title">Welcome Back</h1>
  <p class="auth-sub">Learning Platform</p>

  <!-- Mode tabs: login / signup -->
  <div class="role-tabs" style="grid-template-columns:1fr 1fr 1fr">
    <button class="role-tab active" id="tab-login"   onclick="switchMode('login')">Sign In</button>
    <button class="role-tab"        id="tab-signup"  onclick="switchMode('signup')">Student</button>
    <button class="role-tab"        id="tab-teacher" onclick="switchMode('teacher')">Teacher</button>
  </div>

  <form id="auth-form" onsubmit="return false">

    <!-- Name (signup only) -->
    <div class="form-group" id="name-group" style="display:none">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="full-name" type="text" placeholder="e.g. Jane Smith" autocomplete="name" />
    </div>

    <div class="form-group" id="teacher-code-group" style="display:none">
      <label class="form-label">Teacher Access Code</label>
      <input class="form-input" id="teacher-code" type="text" placeholder="Code provided by admin" />
      <span style="font-size:0.68rem;color:var(--text3);margin-top:4px">Code: <strong style="color:var(--navy)">EEA2026</strong></span>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="email" type="email" placeholder="your@email.com" autocomplete="email" required />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>

    <button class="btn-submit" id="btn-submit" type="submit">Sign In →</button>
    <div id="forgot-wrap" style="text-align:center;margin-top:0.5rem">
      <button type="button" onclick="forgotPassword()" style="background:none;border:none;color:var(--navy);font-size:0.78rem;cursor:pointer;text-decoration:underline">Forgot password?</button>
    </div>
  </form>

  <div class="divider"><span>or</span></div>

  <button class="btn-google" onclick="signInWithGoogle()">
    <!-- Google G logo -->
    <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continue with Google
  </button>

  <div class="switch-mode">
    <span id="switch-text">No account?</span>
    <button id="switch-btn" onclick="switchMode('signup')">Sign Up</button>
  </div>

</div>

<div id="toaster"></div>

<script type="module" src="../js/auth.js"></script>
<script>
  // sync switch button text with mode
  const origSwitch = window.switchMode;
  window.switchMode = function(m) {
    origSwitch && origSwitch(m);
    document.getElementById('switch-text').textContent = m==='login' ? 'No account?' : 'Already have an account?';
    document.getElementById('switch-btn').textContent  = m==='login' ? 'Sign Up' : 'Sign In';
    document.getElementById('switch-btn').onclick = () => window.switchMode(m==='login'?'signup':'login');
  };

  // Pre-select mode from sessionStorage (set by goToLogin() on landing page)
  document.addEventListener('DOMContentLoaded', function() {
    const mode = sessionStorage.getItem('auth_mode');
    sessionStorage.removeItem('auth_mode');
    if (mode === 'signup') {
      setTimeout(() => { if (window.switchMode) window.switchMode('signup'); }, 50);
    }
  });

  window.forgotPassword = async function() {
    const email = document.getElementById('email')?.value.trim();
    if (!email) {
      const input = document.getElementById('email');
      if (input) { input.focus(); input.placeholder = 'Enter your email first'; }
      return;
    }
    const btn = document.querySelector('[onclick="forgotPassword()"]');
    if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
    try {
      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
      const supa = createClient(
        'https://iuucpfxvsabenldczyaw.supabase.co',
        'sb_publishable_kCS9u53wrcvAQKkrb7HQwQ_tnxitFqY'
      );
      const { error } = await supa.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/pages/login.html?mode=reset',
      });
      if (error) throw error;
      const toaster = document.getElementById('toaster');
      const t = document.createElement('div');
      t.className = 'toast success';
      t.textContent = '✅ Password reset email sent! Check your inbox.';
      toaster.appendChild(t);
      setTimeout(() => t.remove(), 5000);
    } catch(e) {
      const toaster = document.getElementById('toaster');
      const t = document.createElement('div');
      t.className = 'toast warning';
      t.textContent = 'Error: ' + e.message;
      toaster.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }
    if (btn) { btn.textContent = 'Forgot password?'; btn.disabled = false; }
  };

  // Handle password reset redirect
  if (window.location.search.includes('mode=reset') || window.location.hash.includes('type=recovery')) {
    document.addEventListener('DOMContentLoaded', function() {
      const resetForm = document.createElement('div');
      resetForm.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
      resetForm.innerHTML = `
        <div style="background:white;padding:2rem;border-radius:12px;width:360px;max-width:90vw">
          <h2 style="margin-bottom:1rem;font-size:1.1rem">Set New Password</h2>
          <input id="new-reset-pass" type="password" placeholder="New password (min 8 chars)" 
            style="width:100%;padding:0.75rem;border:1px solid #ccc;border-radius:6px;margin-bottom:0.75rem;font-family:inherit">
          <button onclick="submitReset()" 
            style="width:100%;padding:0.75rem;background:#10476a;color:white;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.9rem">
            Update Password
          </button>
        </div>`;
      document.body.appendChild(resetForm);

      window.submitReset = async function() {
        const pass = document.getElementById('new-reset-pass')?.value;
        if (!pass || pass.length < 8) { alert('Password must be at least 8 characters'); return; }
        try {
          const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
          const supa = createClient(
            'https://iuucpfxvsabenldczyaw.supabase.co',
            'sb_publishable_kCS9u53wrcvAQKkrb7HQwQ_tnxitFqY'
          );
          const { error } = await supa.auth.updateUser({ password: pass });
          if (error) throw error;
          resetForm.remove();
          alert('✅ Password updated! Please sign in.');
        } catch(e) { alert('Error: ' + e.message); }
      };
    });
  }
</script>
</body>
</html>
